x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  user: "${AIRFLOW_UID:-50000}:0"
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: utc
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # Conexion a la base de datos "analytics" (raw / staging / marts) - separada de la metadata de Airflow
    ANALYTICS_DB_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/analytics
    GITHUB_TOKEN: ${GITHUB_TOKEN}
    DBT_PROFILES_DIR: /opt/airflow/dbt_project
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./extractor:/opt/airflow/extractor
    - ./dbt_project:/opt/airflow/dbt_project
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - github_analytics_net

services:
  postgres:
    image: postgres:16
    container_name: gh_analytics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Base de datos por defecto: metadata de Airflow. Las bases "analytics" y
      # "metabase_app" se crean con los scripts en ./postgres/init
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - github_analytics_net

  airflow-init:
    <<: *airflow-common
    container_name: gh_analytics_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-admin}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: gh_analytics_airflow_webserver
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: gh_analytics_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    <<: *airflow-common
    container_name: gh_analytics_airflow_dag_processor
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: gh_analytics_airflow_triggerer
    command: triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: gh_analytics_metabase
    ports:
      - "3000:3000"
    environment:
      # Base de datos de APLICACION de Metabase (sus propios dashboards, usuarios, etc.)
      # Distinta de "analytics", que es la que vamos a conectar despues, desde la UI,
      # como fuente de datos para construir los dashboards.
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - github_analytics_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  github_analytics_net:
    driver: bridge
